<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools Telegram Views</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --text: #1a1e2b;
      --text-secondary: #5f6b7a;
      --border: #e4e7ed;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-hover: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #eef2ff;
      color: var(--primary);
      transition: background 0.2s;
    }

    .logo-link:hover {
      background: #e0e7ff;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cbd5e1;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-indicator.active {
      background: var(--success);
      box-shadow: 0 0 8px rgba(34,197,94,0.4);
    }

    .status-text {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .status-target {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Control */
    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: var(--text);
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-start {
      background: var(--success);
      color: white;
    }

    .btn-start:hover:not(:disabled) {
      background: #16a34a;
    }

    .btn-stop {
      background: var(--danger);
      color: white;
    }

    .btn-stop:hover:not(:disabled) {
      background: #dc2626;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .stat-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      transition: all 0.2s;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      padding: 8px 0;
      opacity: 0.7;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <a href="https://t.me/Bleszh" target="_blank" class="logo-link" title="Hubungi Saya di Telegram">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 4.01-1.75 6.69-2.9 8.03-3.46 3.82-1.59 4.61-1.87 5.13-1.88.11 0 .37.03.54.17.14.12.18.28.2.44.01.08.01.25 0 .38z" fill="currentColor"/>
        </svg>
      </a>
      <h1 class="title">Tools Telegram Views</h1>
    </header>

    <!-- Status Card -->
    <div class="card status-card" id="statusCard">
      <div class="status-row">
        <span class="status-indicator" id="statusIndicator"></span>
        <div>
          <div class="status-text" id="statusLabel">Tools Tidak Aktif</div>
          <div class="status-target" id="targetDisplay">Masukkan link untuk mulai</div>
        </div>
      </div>
    </div>

    <!-- Control Card -->
    <div class="card control-card">
      <div class="input-group">
        <label for="linkInput">Link Postingan ch Telegram</label>
        <input
          type="text"
          id="linkInput"
          placeholder="https://t.me/flaudils/57"
          autocomplete="off"
        />
      </div>
      <div class="button-group">
        <button id="startBtn" class="btn btn-start">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Start Tools
        </button>
        <button id="stopBtn" class="btn btn-stop" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          Hentikan 
        </button>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Live Views</div>
        <div class="stat-value" id="liveViews">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Token Errors</div>
        <div class="stat-value" id="tokenErrors">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Proxy Errors</div>
        <div class="stat-value" id="proxyErrors">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Threads</div>
        <div class="stat-value" id="activeThreads">0</div>
      </div>
    </div>

  </div>

  <script>
    const API_BASE = 'https://views-telegram.onrender.com';

    // DOM elements
    const statusIndicator = document.getElementById('statusIndicator');
    const statusLabel = document.getElementById('statusLabel');
    const targetDisplay = document.getElementById('targetDisplay');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const linkInput = document.getElementById('linkInput');
    const liveViewsEl = document.getElementById('liveViews');
    const tokenErrorsEl = document.getElementById('tokenErrors');
    const proxyErrorsEl = document.getElementById('proxyErrors');
    const activeThreadsEl = document.getElementById('activeThreads');

    let pollingInterval = null;
    let isRunning = false;

    // Parse Telegram link
    function parseLink(link) {
      const match = link.match(/https?:\/\/t\.me\/([^/]+)\/(\d+)/);
      if (!match) return null;
      return { channel: match[1], post: parseInt(match[2]) };
    }

    // Update UI berdasarkan status
    function updateUI(status) {
      isRunning = status.running;
      if (isRunning) {
        statusIndicator.classList.add('active');
        statusLabel.textContent = 'Bot Aktif';
        targetDisplay.textContent = `Channel: @${status.channel || '?'} | Post: ${status.post || '?'}`;
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } else {
        statusIndicator.classList.remove('active');
        statusLabel.textContent = 'Bot Tidak Aktif';
        targetDisplay.textContent = 'Masukkan link untuk mulai';
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }

      // Statistik (fallback ke 0 jika tidak ada)
      liveViewsEl.textContent = status.views ?? 0;
      tokenErrorsEl.textContent = status.token_errors ?? 0;
      proxyErrorsEl.textContent = status.proxy_errors ?? 0;
      activeThreadsEl.textContent = status.active_threads ?? 0;
    }

    // Poll status
    async function fetchStatus() {
      try {
        const response = await fetch(`${API_BASE}/status`);
        if (!response.ok) throw new Error('Gagal fetch status');
        const data = await response.json();
        updateUI(data);
      } catch (error) {
        console.error('Polling error:', error);
      }
    }

    function startPolling() {
      if (pollingInterval) clearInterval(pollingInterval);
      fetchStatus(); // immediate
      pollingInterval = setInterval(fetchStatus, 2000);
    }

    function stopPolling() {
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }

    // Start bot
    async function startBot() {
      const link = linkInput.value.trim();
      if (!link) {
        alert('Masukkan link postingan Telegram terlebih dahulu.');
        return;
      }
      const parsed = parseLink(link);
      if (!parsed) {
        alert('Format link salah. Gunakan: https://t.me/channel/post');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ channel: parsed.channel, post: parsed.post })
        });
        const data = await response.json();
        if (!response.ok) {
          alert(data.message || 'Gagal memulai bot.');
          return;
        }
        // Mulai polling
        startPolling();
      } catch (error) {
        alert('Gagal menghubungi backend.');
      }
    }

    // Stop bot
    async function stopBot() {
      try {
        const response = await fetch(`${API_BASE}/stop`, { method: 'POST' });
        const data = await response.json();
        if (!response.ok) {
          alert(data.message || 'Gagal menghentikan bot.');
          return;
        }
        stopPolling();
        // Refresh status final
        await fetchStatus();
      } catch (error) {
        alert('Gagal menghubungi backend.');
      }
    }

    // Event listeners
    startBtn.addEventListener('click', startBot);
    stopBtn.addEventListener('click', stopBot);

    // Initial check
    fetchStatus();

    // Cleanup polling when page unloads (optional)
    window.addEventListener('beforeunload', () => stopPolling());
  </script>
</body>
</html>
