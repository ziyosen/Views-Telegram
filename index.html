<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools Telegram Views</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #f4f6fa;
      --bg-end: #f4f6fa;
      --card-bg: #ffffff;
      --card-border: #f0f2f5;
      --text: #111827;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --primary: #4f46e5;
      --success: #6ee7b7;
      --success-text: #10b981;
      --danger: #f87171;
      --radius: 20px;
      --radius-sm: 14px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6fa;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 4px;
    }

    .logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #5468ff;
      color: white;
      text-decoration: none;
    }

    .title-group {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1e293b;
    }

    .subtitle {
      display: none; /* Disembunyikan agar bersih seperti foto */
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid #f1f5f9;
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ef4444; /* Default tidak aktif merah/abu */
      flex-shrink: 0;
      position: relative;
    }

    .status-indicator.active {
      background: #22c55e;
    }

    .status-indicator.active::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
      left: 0;
      top: 0;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    .status-text {
      font-weight: 700;
      font-size: 1.15rem;
      color: #0f172a;
    }

    .status-target {
      font-size: 0.88rem;
      color: #64748b;
      margin-top: 4px;
      font-weight: 500;
    }

    /* Control */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 12px;
      color: #1e293b;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      display: none; /* Disembunyikan agar input box bersih seperti di screenshot */
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 0.95rem;
      border: 1px solid #e2e8f0;
      border-radius: var(--radius-sm);
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
      background: #ffffff;
      color: #334155;
    }

    .input-group input:focus {
      border-color: #cbd5e1;
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    .btn-start {
      background: #86efac;
      color: #166534;
    }

    .btn-stop {
      background: #f87171;
      color: #ffffff;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 16px;
      box-shadow: var(--shadow);
      border: 1px solid #f1f5f9;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stat-icon {
      display: none; /* Dihapus agar persis seperti kotak statistik di foto */
    }

    .stat-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 2.3rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1.2;
    }

    /* Footer */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px 0 8px 0;
      margin-top: 8px;
    }

    .footer a {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .footer-divider {
      display: none; /* Dibuat stacked vertikal tipis seperti desain modern */
    }

    .footer-text {
      font-size: 0.75rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="https://t.me/Bleszh" target="_blank" class="logo-link" title="Hubungi Dev: @Bleszh">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 4.01-1.75 6.69-2.9 8.03-3.46 3.82-1.59 4.61-1.87 5.13-1.88.11 0 .37.03.54.17.14.12.18.28.2.44.01.08.01.25 0 .38z"/>
        </svg>
      </a>
      <div class="title-group">
        <h1 class="title">Tools Telegram Views</h1>
        <span class="subtitle">Auto Views Multi-Session</span>
      </div>
    </header>

    <div class="card" id="statusCard">
      <div class="status-row">
        <span class="status-indicator" id="statusIndicator"></span>
        <div>
          <div class="status-text" id="statusLabel">Bot Tidak Aktif</div>
          <div class="status-target" id="targetDisplay">Masukkan link untuk mulai</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="input-group">
        <label for="linkInput">Link Postingan ch Telegram</label>
        <div class="input-wrapper">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <input type="text" id="linkInput" placeholder="https://t.me/channel/123" autocomplete="off"/>
        </div>
      </div>
      <div class="button-group">
        <button id="startBtn" class="btn btn-start">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Start Tools
        </button>
        <button id="stopBtn" class="btn btn-stop" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          Hentikan
        </button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="stat-label">Live Views</div>
        <div class="stat-value" id="liveViews">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="stat-label">Token Errors</div>
        <div class="stat-value" id="tokenErrors">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </div>
        <div class="stat-label">Proxy Errors</div>
        <div class="stat-value" id="proxyErrors">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="22"/><path d="M2 12h20"/></svg>
        </div>
        <div class="stat-label">Threads</div>
        <div class="stat-value" id="activeThreads">0</div>
      </div>
    </div>

    <div class="footer">
      <a href="https://t.me/Bleszh" target="_blank" title="Hubungi Dev di Telegram">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 4.01-1.75 6.69-2.9 8.03-3.46 3.82-1.59 4.61-1.87 5.13-1.88.11 0 .37.03.54.17.14.12.18.28.2.44.01.08.01.25 0 .38z"/>
        </svg>
          Dev: @Bleszh
      </a>
      <span class="footer-divider"></span>
      <span class="footer-text">www.zeinthhub.xinquins.dpdns.org</span>
    </div>
  </div>

  <script>
    const API_BASE = 'https://views-telegram.onrender.com';
    let sessionId = null;

    // DOM elements
    const statusIndicator = document.getElementById('statusIndicator');
    const statusLabel = document.getElementById('statusLabel');
    const targetDisplay = document.getElementById('targetDisplay');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const linkInput = document.getElementById('linkInput');
    const liveViewsEl = document.getElementById('liveViews');
    const tokenErrorsEl = document.getElementById('tokenErrors');
    const proxyErrorsEl = document.getElementById('proxyErrors');
    const activeThreadsEl = document.getElementById('activeThreads');

    let pollingInterval = null;

    // Buat session saat halaman load
    async function createSession() {
      try {
        const res = await fetch(`${API_BASE}/create_session`, { method: 'POST' });
        const data = await res.json();
        sessionId = data.session_id;
        console.log('Session:', sessionId);
      } catch (err) {
        console.error('Gagal buat session:', err);
      }
    }

    function parseLink(link) {
      const match = link.match(/https?:\/\/t\.me\/([^/]+)\/(\d+)/);
      if (!match) return null;
      return { channel: match[1], post: parseInt(match[2]) };
    }

    function updateUI(status) {
      const running = status.running;
      if (running) {
        statusIndicator.classList.add('active');
        statusLabel.textContent = 'Bot Aktif';
        targetDisplay.textContent = `Channel: @${status.channel || '?'} | Post: ${status.post || '?'}`;
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } else {
        statusIndicator.classList.remove('active');
        statusLabel.textContent = 'Bot Tidak Aktif';
        targetDisplay.textContent = 'Masukkan link untuk mulai';
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }

      liveViewsEl.textContent = status.success_views ?? status.views ?? 0;
      tokenErrorsEl.textContent = status.token_errors ?? 0;
      proxyErrorsEl.textContent = status.proxy_errors ?? 0;
      activeThreadsEl.textContent = status.active_threads ?? 0;
    }

    async function fetchStatus() {
      if (!sessionId) return;
      try {
        const res = await fetch(`${API_BASE}/status?session_id=${sessionId}`);
        if (!res.ok) throw new Error('Gagal fetch');
        updateUI(await res.json());
      } catch (err) {
        console.error('Polling error:', err);
      }
    }

    function startPolling() {
      if (pollingInterval) clearInterval(pollingInterval);
      fetchStatus();
      pollingInterval = setInterval(fetchStatus, 2000);
    }

    function stopPolling() {
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }

    async function startBot() {
      const link = linkInput.value.trim();
      if (!link) return alert('Masukkan link terlebih dahulu.');
      const parsed = parseLink(link);
      if (!parsed) return alert('Format link salah. Gunakan: https://t.me/channel/post');

      try {
        const res = await fetch(`${API_BASE}/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, channel: parsed.channel, post: parsed.post })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.message);
        startPolling();
      } catch (err) {
        alert('Gagal menghubungi backend.');
      }
    }

    async function stopBot() {
      try {
        const res = await fetch(`${API_BASE}/stop`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.message);
        stopPolling();
        await fetchStatus();
      } catch (err) {
        alert('Gagal menghubungi backend.');
      }
    }

    startBtn.addEventListener('click', startBot);
    stopBtn.addEventListener('click', stopBot);

    // Init
    createSession();
    fetchStatus();
    window.addEventListener('beforeunload', stopPolling);
  </script>
</body>
</html>
