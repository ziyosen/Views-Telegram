<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools Telegram Views</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f4f7;
      --card-bg: #ffffff;
      --text: #1a1e2b;
      --text-secondary: #5f6b7a;
      --border: #e4e7ed;
      --primary: #4f46e5;
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 4px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.02);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(79,70,229,0.25);
      transition: transform 0.2s;
    }

    .logo:active {
      transform: scale(0.95);
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cbd5e1;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 10px rgba(34,197,94,0.5);
    }

    .status-info p {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .status-target {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* Input */
    .input-field {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 16px;
      transition: border 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.08);
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .btn-start {
      background: var(--success);
      color: white;
      box-shadow: 0 4px 8px rgba(34,197,94,0.25);
    }

    .btn-stop {
      background: var(--danger);
      color: white;
      box-shadow: 0 4px 8px rgba(239,68,68,0.25);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-item {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
      transition: transform 0.2s;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      transition: all 0.3s ease;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .footer a {
      display: flex;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 500;
    }

    .divider {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #ccc;
    }

    /* Mobile optimization */
    @media (max-width: 360px) {
      .stats-grid {
        gap: 8px;
      }
      .stat-value {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <a href="https://t.me/Bleszh" target="_blank" class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 4.01-1.75 6.69-2.9 8.03-3.46 3.82-1.59 4.61-1.87 5.13-1.88.11 0 .37.03.54.17.14.12.18.28.2.44.01.08.01.25 0 .38z"/></svg>
      </a>
      <div>
        <div class="title">Telegram Views</div>
        <div class="subtitle">Auto Views Tool</div>
      </div>
    </div>

    <!-- Status -->
    <div class="card">
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <div class="status-info">
          <p id="statusText">Bot Tidak Aktif</p>
          <div class="status-target" id="targetInfo">Masukkan link untuk mulai</div>
        </div>
      </div>
    </div>

    <!-- Control -->
    <div class="card">
      <input type="text" class="input-field" id="linkInput" placeholder="https://t.me/channel/123" autocomplete="off">
      <div class="btn-row">
        <button class="btn btn-start" id="startBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Mulai
        </button>
        <button class="btn btn-stop" id="stopBtn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          Hentikan
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-label">Live Views</div>
        <div class="stat-value" id="liveViews">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Token Errors</div>
        <div class="stat-value" id="tokenErrors">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Proxy Errors</div>
        <div class="stat-value" id="proxyErrors">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Threads</div>
        <div class="stat-value" id="activeThreads">0</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://t.me/Bleszh" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 4.01-1.75 6.69-2.9 8.03-3.46 3.82-1.59 4.61-1.87 5.13-1.88.11 0 .37.03.54.17.14.12.18.28.2.44.01.08.01.25 0 .38z"/></svg>
        @Bleszh
      </a>
      <span class="divider"></span>
      <span>www.zeinthhub.xinquins.dpdns.org</span>
    </div>
  </div>

  <script>
    const API_BASE = 'https://views-telegram.onrender.com';
    let sessionId = null;

    // DOM
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const targetInfo = document.getElementById('targetInfo');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const linkInput = document.getElementById('linkInput');
    const liveViewsEl = document.getElementById('liveViews');
    const tokenErrorsEl = document.getElementById('tokenErrors');
    const proxyErrorsEl = document.getElementById('proxyErrors');
    const activeThreadsEl = document.getElementById('activeThreads');

    let polling = null;

    // Fungsi animasi angka
    function animateValue(element, start, end, duration = 300) {
      if (start === end) {
        element.textContent = end;
        return;
      }
      const range = end - start;
      const increment = range > 0 ? 1 : -1;
      const stepTime = Math.abs(Math.floor(duration / range));
      let current = start;
      const timer = setInterval(() => {
        current += increment;
        element.textContent = current;
        if (current === end) {
          clearInterval(timer);
        }
      }, stepTime);
    }

    // Stop session lama & buat baru
    async function createSession() {
      // Hentikan session sebelumnya jika ada
      if (sessionId) {
        try {
          await fetch(`${API_BASE}/stop`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId })
          });
        } catch (e) {}
      }

      try {
        const res = await fetch(`${API_BASE}/create_session`, { method: 'POST' });
        const data = await res.json();
        sessionId = data.session_id;
        console.log('Session:', sessionId);
      } catch (e) {
        console.error('Gagal buat session', e);
      }
    }

    function parseLink(link) {
      const m = link.match(/https?:\/\/t\.me\/([^/]+)\/(\d+)/);
      return m ? { channel: m[1], post: parseInt(m[2]) } : null;
    }

    // Simpan nilai sebelumnya untuk animasi
    let prevValues = {
      views: 0,
      tokenErrors: 0,
      proxyErrors: 0,
      threads: 0
    };

    function updateUI(data) {
      const running = data.running;
      if (running) {
        statusDot.classList.add('active');
        statusText.textContent = 'Bot Aktif';
        targetInfo.textContent = `@${data.channel || '?'}/${data.post || '?'}`;
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } else {
        statusDot.classList.remove('active');
        statusText.textContent = 'Bot Tidak Aktif';
        targetInfo.textContent = 'Masukkan link untuk mulai';
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }

      // Gunakan data.views (dari Telegram langsung), bukan success_views
      const newViews = parseInt(data.views) || 0;
      const newTokenErrors = parseInt(data.token_errors) || 0;
      const newProxyErrors = parseInt(data.proxy_errors) || 0;
      const newThreads = parseInt(data.active_threads) || 0;

      animateValue(liveViewsEl, prevValues.views, newViews);
      animateValue(tokenErrorsEl, prevValues.tokenErrors, newTokenErrors);
      animateValue(proxyErrorsEl, prevValues.proxyErrors, newProxyErrors);
      animateValue(activeThreadsEl, prevValues.threads, newThreads);

      prevValues.views = newViews;
      prevValues.tokenErrors = newTokenErrors;
      prevValues.proxyErrors = newProxyErrors;
      prevValues.threads = newThreads;
    }

    async function fetchStatus() {
      if (!sessionId) return;
      try {
        const res = await fetch(`${API_BASE}/status?session_id=${sessionId}`);
        if (res.ok) updateUI(await res.json());
      } catch (e) {}
    }

    function startPolling() {
      if (polling) clearInterval(polling);
      fetchStatus();
      polling = setInterval(fetchStatus, 2000);
    }

    function stopPolling() {
      if (polling) { clearInterval(polling); polling = null; }
    }

    async function startBot() {
      const link = linkInput.value.trim();
      if (!link) return alert('Masukkan link.');
      const p = parseLink(link);
      if (!p) return alert('Format: https://t.me/channel/post');

      try {
        const res = await fetch(`${API_BASE}/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, channel: p.channel, post: p.post })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.message);
        startPolling();
      } catch (e) {
        alert('Gagal menghubungi backend.');
      }
    }

    async function stopBot() {
      try {
        const res = await fetch(`${API_BASE}/stop`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.message);
        stopPolling();
        await fetchStatus();
      } catch (e) {
        alert('Gagal menghubungi backend.');
      }
    }

    startBtn.addEventListener('click', startBot);
    stopBtn.addEventListener('click', stopBot);

    // Saat halaman ditutup / reload, stop session
    window.addEventListener('beforeunload', () => {
      if (sessionId) {
        navigator.sendBeacon(`${API_BASE}/stop`, JSON.stringify({ session_id: sessionId }));
      }
    });

    // Init
    createSession().then(() => fetchStatus());
  </script>
</body>
</html>
