<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools Telegram Views</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #f0f2f5;
      --bg-end: #e8ecf1;
      --card-bg: rgba(255,255,255,0.9);
      --card-border: rgba(255,255,255,0.6);
      --text: #1a1e2b;
      --text-secondary: #5f6b7a;
      --border: #e4e7ed;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --success: #22c55e;
      --success-hover: #16a34a;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.07), 0 4px 10px rgba(0,0,0,0.04);
      --glow: 0 0 20px rgba(79,70,229,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2px;
    }

    .logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(79,70,229,0.3);
      flex-shrink: 0;
    }

    .logo-link:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(79,70,229,0.4);
    }

    .title-group {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.2;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 22px 26px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
    }

    .card:hover {
      box-shadow: var(--shadow-lg), var(--glow);
      border-color: rgba(79,70,229,0.15);
    }

    /* Status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #cbd5e1;
      flex-shrink: 0;
      transition: all 0.3s;
      position: relative;
    }

    .status-indicator.active {
      background: var(--success);
      box-shadow: 0 0 12px rgba(34,197,94,0.6);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(34,197,94,0.4); }
      50% { box-shadow: 0 0 16px rgba(34,197,94,0.7); }
    }

    .status-text {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .status-target {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 2px;
      font-weight: 500;
    }

    /* Control */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      font-size: 0.95rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      background: white;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,70,229,0.08);
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.01em;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-start {
      background: var(--success);
      color: white;
      box-shadow: 0 4px 12px rgba(34,197,94,0.3);
    }

    .btn-start:hover:not(:disabled) {
      background: var(--success-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(34,197,94,0.4);
    }

    .btn-stop {
      background: var(--danger);
      color: white;
      box-shadow: 0 4px 12px rgba(239,68,68,0.3);
    }

    .btn-stop:hover:not(:disabled) {
      background: var(--danger-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(239,68,68,0.4);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 16px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: all 0.3s;
    }

    .stat-box:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .stat-icon {
      margin-bottom: 6px;
      color: var(--primary);
      opacity: 0.7;
    }

    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      transition: all 0.3s;
      letter-spacing: -0.02em;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 0;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .footer:hover {
      opacity: 1;
    }

    .footer a {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--primary);
    }

    .footer svg {
      flex-shrink: 0;
    }

    .footer-divider {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-secondary);
      opacity: 0.4;
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      .button-group {
        flex-direction: column;
      }
      .title {
        font-size: 1.3rem;
      }
      .container {
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <a href="https://t.me/Bleszh" target="_blank" class="logo-link" title="Hubungi Dev: @Bleszh">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 4.01-1.75 6.69-2.9 8.03-3.46 3.82-1.59 4.61-1.87 5.13-1.88.11 0 .37.03.54.17.14.12.18.28.2.44.01.08.01.25 0 .38z"/>
        </svg>
      </a>
      <div class="title-group">
        <h1 class="title">Tools Telegram Views</h1>
        <span class="subtitle">Auto Views Multi-Session</span>
      </div>
    </header>

    <!-- Status Card -->
    <div class="card" id="statusCard">
      <div class="status-row">
        <span class="status-indicator" id="statusIndicator"></span>
        <div>
          <div class="status-text" id="statusLabel">Bot Tidak Aktif</div>
          <div class="status-target" id="targetDisplay">Masukkan link untuk mulai</div>
        </div>
      </div>
    </div>

    <!-- Control Card -->
    <div class="card">
      <div class="input-group">
        <label for="linkInput">Link Postingan Telegram</label>
        <div class="input-wrapper">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <input type="text" id="linkInput" placeholder="https://t.me/channel/123" autocomplete="off"/>
        </div>
      </div>
      <div class="button-group">
        <button id="startBtn" class="btn btn-start">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Mulai Bot
        </button>
        <button id="stopBtn" class="btn btn-stop" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          Hentikan
        </button>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="stat-label">Live Views</div>
        <div class="stat-value" id="liveViews">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="stat-label">Token Errors</div>
        <div class="stat-value" id="tokenErrors">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </div>
        <div class="stat-label">Proxy Errors</div>
        <div class="stat-value" id="proxyErrors">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="22"/><path d="M2 12h20"/></svg>
        </div>
        <div class="stat-label">Threads</div>
        <div class="stat-value" id="activeThreads">0</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://t.me/Bleszh" target="_blank" title="Hubungi Dev di Telegram">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 4.01-1.75 6.69-2.9 8.03-3.46 3.82-1.59 4.61-1.87 5.13-1.88.11 0 .37.03.54.17.14.12.18.28.2.44.01.08.01.25 0 .38z"/>
        </svg>
         Dev: @Bleszh
      </a>
      <span class="footer-divider"></span>
      <span class="footer-text">www.zeinthhub.xinquins.dpdns.org</span>
    </div>
  </div>

  <script>
    const API_BASE = 'https://views-telegram.onrender.com';
    let sessionId = null;

    // DOM elements
    const statusIndicator = document.getElementById('statusIndicator');
    const statusLabel = document.getElementById('statusLabel');
    const targetDisplay = document.getElementById('targetDisplay');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const linkInput = document.getElementById('linkInput');
    const liveViewsEl = document.getElementById('liveViews');
    const tokenErrorsEl = document.getElementById('tokenErrors');
    const proxyErrorsEl = document.getElementById('proxyErrors');
    const activeThreadsEl = document.getElementById('activeThreads');

    let pollingInterval = null;

    // Buat session saat halaman load
    async function createSession() {
      try {
        const res = await fetch(`${API_BASE}/create_session`, { method: 'POST' });
        const data = await res.json();
        sessionId = data.session_id;
        console.log('Session:', sessionId);
      } catch (err) {
        console.error('Gagal buat session:', err);
      }
    }

    function parseLink(link) {
      const match = link.match(/https?:\/\/t\.me\/([^/]+)\/(\d+)/);
      if (!match) return null;
      return { channel: match[1], post: parseInt(match[2]) };
    }

    function updateUI(status) {
      const running = status.running;
      if (running) {
        statusIndicator.classList.add('active');
        statusLabel.textContent = 'Bot Aktif';
        targetDisplay.textContent = `Channel: @${status.channel || '?'} | Post: ${status.post || '?'}`;
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } else {
        statusIndicator.classList.remove('active');
        statusLabel.textContent = 'Bot Tidak Aktif';
        targetDisplay.textContent = 'Masukkan link untuk mulai';
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }

      liveViewsEl.textContent = status.success_views ?? status.views ?? 0;
      tokenErrorsEl.textContent = status.token_errors ?? 0;
      proxyErrorsEl.textContent = status.proxy_errors ?? 0;
      activeThreadsEl.textContent = status.active_threads ?? 0;
    }

    async function fetchStatus() {
      if (!sessionId) return;
      try {
        const res = await fetch(`${API_BASE}/status?session_id=${sessionId}`);
        if (!res.ok) throw new Error('Gagal fetch');
        updateUI(await res.json());
      } catch (err) {
        console.error('Polling error:', err);
      }
    }

    function startPolling() {
      if (pollingInterval) clearInterval(pollingInterval);
      fetchStatus();
      pollingInterval = setInterval(fetchStatus, 2000);
    }

    function stopPolling() {
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }

    async function startBot() {
      const link = linkInput.value.trim();
      if (!link) return alert('Masukkan link terlebih dahulu.');
      const parsed = parseLink(link);
      if (!parsed) return alert('Format link salah. Gunakan: https://t.me/channel/post');

      try {
        const res = await fetch(`${API_BASE}/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, channel: parsed.channel, post: parsed.post })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.message);
        startPolling();
      } catch (err) {
        alert('Gagal menghubungi backend.');
      }
    }

    async function stopBot() {
      try {
        const res = await fetch(`${API_BASE}/stop`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json();
        if (!res.ok) return alert(data.message);
        stopPolling();
        await fetchStatus();
      } catch (err) {
        alert('Gagal menghubungi backend.');
      }
    }

    startBtn.addEventListener('click', startBot);
    stopBtn.addEventListener('click', stopBot);

    // Init
    createSession();
    fetchStatus();
    window.addEventListener('beforeunload', stopPolling);
  </script>
</body>
</html>
